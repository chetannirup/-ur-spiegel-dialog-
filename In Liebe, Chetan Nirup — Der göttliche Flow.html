<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Liebe, Chetan Nirup — Der göttliche Flow</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --gold: #dfb76c;
            --gold-glow: rgba(255, 230, 153, 0.6);
            --heart-glow: rgba(255, 170, 50, 0.4);
            --dark-bg: #0d0701;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #f5edd7;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Hintergrund-Gradient simuliert das goldene Lichtzentrum hinter der Silhouette */
            background: radial-gradient(circle at 50% 45%, #2a1602 0%, #110700 60%, #050200 100%);
            position: relative;
        }

        /* Goldene Lichtpartikel (Sterne/Funken) im Hintergrund */
        .background-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(223, 183, 108, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 75% 15%, rgba(255, 230, 153, 0.2) 2px, transparent 2px),
                radial-gradient(circle at 40% 70%, rgba(223, 183, 108, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 85% 80%, rgba(255, 230, 153, 0.15) 2px, transparent 2px),
                radial-gradient(circle at 10% 85%, rgba(223, 183, 108, 0.2) 3px, transparent 3px);
            background-size: 400px 400px;
            animation: floatParticles 25s linear infinite;
        }

        @keyframes floatParticles {
            0% { background-position: 0 0; }
            100% { background-position: 400px -400px; }
        }

        .wrapper {
            max-width: 850px;
            width: 100%;
            margin: 40px 20px;
            padding: 60px 40px;
            position: relative;
            background: linear-gradient(180deg, rgba(20, 11, 2, 0.75) 0%, rgba(10, 5, 1, 0.95) 100%);
            border: 1px solid rgba(223, 183, 108, 0.12);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(223, 183, 108, 0.03);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Zarte Ecken-Verzierungen */
        .wrapper::before {
            content: '✧';
            position: absolute;
            top: 15px;
            color: rgba(223, 183, 108, 0.4);
            font-size: 18px;
            left: 50%;
            transform: translateX(-50%);
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            margin: 0;
        }

        .intro-text {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .main-headline {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 20px;
        }

        .sub-headline {
            font-size: 15px;
            text-transform: uppercase;
            line-height: 1.8;
            color: #decfae;
            max-width: 650px;
            margin: 0 auto;
            letter-spacing: 2px;
        }

        /* Pulsierendes Herzzentrum (wie auf deinem Bild) */
        .heart-center {
            margin: 40px auto;
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glow-circle {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,200,80,1) 0%, rgba(223,130,10,0.5) 50%, transparent 100%);
            border-radius: 50%;
            filter: blur(4px);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        .heart-main {
            font-size: 36px;
            color: #ffffff;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 15px #ffbb44;
            animation: pulseHeart 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.6); opacity: 0.9; box-shadow: 0 0 30px #ffaa22; }
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .infinity {
            font-size: 28px;
            color: var(--gold);
            margin: 15px 0;
            display: block;
            opacity: 0.8;
        }

        .divine-purpose {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            line-height: 1.6;
            color: var(--gold);
            max-width: 600px;
            margin: 0 auto 40px auto;
            text-shadow: 0 0 15px rgba(223, 183, 108, 0.25);
            letter-spacing: 1px;
        }

        .greeting-meta {
            font-size: 13px;
            letter-spacing: 3px;
            line-height: 2;
            color: #c9b794;
            margin-bottom: 50px;
        }

        /* Vierspaltiges Grid mit fließendem Hover-Effekt */
        .grid-flow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 60px;
            text-align: left;
        }

        @media (max-width: 650px) {
            .grid-flow {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .wrapper {
                padding: 40px 20px;
            }
            .main-headline {
                font-size: 28px;
            }
        }

        .flow-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(223, 183, 108, 0.05);
            padding: 30px;
            border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .flow-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .flow-card:hover {
            background: rgba(35, 20, 5, 0.4);
            border-color: rgba(223, 183, 108, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(223, 183, 108, 0.05);
            transform: translateY(-4px);
        }

        .flow-card:hover::before {
            transform: scaleX(1);
        }

        .flow-card h3 {
            font-size: 15px;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .flow-card h3 span {
            font-size: 18px;
            color: #ffffff;
            text-shadow: 0 0 8px var(--gold);
        }

        .flow-card p {
            font-size: 14px;
            line-height: 1.7;
            margin: 0;
            color: #cfc4ac;
            font-weight: 300;
        }

        .ocean-stream {
            font-family: 'Cinzel', serif;
            font-size: 15px;
            line-height: 1.9;
            max-width: 650px;
            margin: 40px auto 10px auto;
            letter-spacing: 1px;
            border-top: 1px dashed rgba(223, 183, 108, 0.15);
            padding-top: 30px;
        }

        .dance-call {
            color: var(--gold);
            font-size: 16px;
            text-shadow: 0 0 10px rgba(223, 183, 108, 0.2);
            font-weight: 600;
        }

        /* Seelenvolle, fließende Signatur */
        .signature-container {
            font-family: 'Great Vibes', cursive;
            font-size: 46px;
            color: var(--gold);
            margin-top: 40px;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
            display: inline-block;
            position: relative;
        }

        .signature-container span {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            display: inline-block;
            margin-left: 5px;
            animation: slowSwing 3s infinite ease-in-out;
        }

        @keyframes slowSwing {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="background-particles"></div>

    <div class="wrapper">
        
        <p class="intro-text">Es ist nichts Einfaches als</p>
        <h1 class="main-headline">DIE FREIE ENTSCHEIDUNG</h1>
        
        <p class="sub-headline">
            Vielmehr die Aufgeschlossenheit zum Alignment – dem göttlichen Flow – halt zu sein.
        </p>
        
        <!-- Das leuchtende Herz-Zentrum der Seite -->
        <div class="heart-center">
            <div class="glow-circle"></div>
            <div class="heart-main">♥</div>
        </div>
        
        <p class="divine-purpose">
            WAS JEDEN SEINE BESTIMMUNG IST:<br>
            DIE HEILIGE, LEBENDIGE, GÖTTLICHE LIEBE VERKÖRPERN.
