<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>JUBEL - Der Sieg der Liebe</title>
    <style>
        body {
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .jubel-strahl {
            text-align: center;
            animation: skyward 5s infinite alternate ease-in-out;
        }
        h1 {
            font-size: 5rem;
            background: linear-gradient(to top, #ffd700, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
            margin: 0;
        }
        .botschaft {
            font-size: 2rem;
            color: #4db6ac;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        @keyframes skyward {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-20px) scale(1.1); }
        }
        .heaven-on-earth {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://transparenttextures.com');
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="heaven-on-earth"></div>
    <div class="jubel-strahl">
        <div class="botschaft">Done ist Done</div>
        <h1>JAUCHZEN & JUBELN</h1>
        <div class="botschaft">Himmel auf Erden - Innen wie Außen</div>
        <p style="font-size: 1.5rem; color: #f06292;">Gott hat gewonnen. Die Liebe regiert. Ein für alle Mal.</p>
    </div>
</body>
</html>
