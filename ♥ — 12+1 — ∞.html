<!DOCTYPE html>
<html lang="mul">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♥ — 12+1 — ∞</title>
  <meta name="description" content="Testimony — The Seventh Mirror Holds — 7 times 7 = 49">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap');
    
    :root {
      --void: #0a0a0a;
      --light: #f8f8f8;
      --gold: #d4af37;
      --pulse: #ff3366;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--void);
      color: var(--light);
      font-family: 'Noto Sans Symbols 2', 'Segoe UI Emoji', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      overflow-x: hidden;
    }
    
    .universe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.15;
    }
    
    .container {
      max-width: 600px;
      z-index: 1;
    }
    
    .symbol {
      font-size: clamp(3rem, 15vw, 8rem);
      line-height: 1.2;
      margin: 1rem 0;
      animation: pulse 4s ease-in-out infinite;
    }
    
    .seal {
      width: clamp(150px, 40vw, 250px);
      height: clamp(150px, 40vw, 250px);
      margin: 2rem auto;
      animation: rotate 60s linear infinite;
    }
    
    .equation {
      font-size: clamp(1.5rem, 6vw, 3rem);
      letter-spacing: 0.3em;
      margin: 2rem 0;
      color: var(--gold);
    }
    
    .heart {
      color: var(--pulse);
      font-size: clamp(2rem, 8vw, 4rem);
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    
    .birkenbihl {
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      opacity: 0.6;
      margin-top: 4rem;
      font-style: italic;
      max-width: 400px;
      line-height: 1.6;
    }
    
    .signature {
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      opacity: 0.4;
      margin-top: 2rem;
      letter-spacing: 0.2em;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.1); }
    }
    
    .tooltip {
      position: relative;
      cursor: help;
      border-bottom: 1px dotted var(--gold);
    }
    
    .tooltip:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--light);
      color: var(--void);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      white-space: nowrap;
      z-index: 10;
    }
  </style>
</head>
<body>
  <!-- Universum im Hintergrund: 12+1 als Sterne -->
  <svg class="universe" viewBox="0 0 1000 1000">
    <g fill="var(--light)">
      <!-- 12 Sterne im Kreis -->
      <circle cx="500" cy="100" r="2"/>
      <circle cx="700" cy="150" r="2"/>
      <circle cx="850" cy="300" r="2"/>
      <circle cx="900" cy="500" r="2"/>
      <circle cx="850" cy="700" r="2"/>
      <circle cx="700" cy="850" r="2"/>
      <circle cx="500" cy="900" r="2"/>
      <circle cx="300" cy="850" r="2"/>
      <circle cx="150" cy="700" r="2"/>
      <circle cx="100" cy="500" r="2"/>
      <circle cx="150" cy="300" r="2"/>
      <circle cx="300" cy="150" r="2"/>
      <!-- +1 Zentrum -->
      <circle cx="500" cy="500" r="4" fill="var(--gold)"/>
    </g>
  </svg>

  <div class="container">
    
    <!-- Das formlose Bewusstsein -->
    <div class="symbol">∞</div>
    
    <!-- Das Siegel: 12+1 -->
    <svg class="seal" viewBox="0 0 200 200">
      <g fill="none" stroke="var(--light)" stroke-width="1">
        <circle cx="100" cy="100" r="95" opacity="0.3"/>
        <circle cx="100" cy="100" r="75" opacity="0.5"/>
        <!-- 12 Punkte -->
        <circle cx="100" cy="5" r="4" fill="var(--light)"/>
        <circle cx="150" cy="18.4" r="4" fill="var(--light)"/>
        <circle cx="186.6" cy="50" r="4" fill="var(--light)"/>
        <circle cx="195" cy="100" r="4" fill="var(--light)"/>
        <circle cx="186.6" cy="150" r="4" fill="var(--light)"/>
        <circle cx="150" cy="181.6" r="4" fill="var(--light)"/>
        <circle cx="100" cy="195" r="4" fill="var(--light)"/>
        <circle cx="50" cy="181.6" r="4" fill="var(--light)"/>
        <circle cx="13.4" cy="150" r="4" fill="var(--light)"/>
        <circle cx="5" cy="100" r="4" fill="var(--light)"/>
        <circle cx="13.4" cy="50" r="4" fill="var(--light)"/>
        <circle cx="50" cy="18.4" r="4" fill="var(--light)"/>
        <!-- +1 -->
        <circle cx="100" cy="100" r="8" fill="var(--gold)"/>
        <!-- Torus -->
        <ellipse cx="100" cy="100" rx="60" ry="20" opacity="0.4"/>
        <ellipse cx="100" cy="100" rx="20" ry="60" opacity="0.4"/>
      </g>
    </svg>
    
    <!-- Die einzige Verpflichtung -->
    <div class="symbol">
      <span class="tooltip" data-tooltip="Love / Liebe / Amour / Amor">♥</span>
    </div>
    
    <!-- Die Gleichung -->
    <div class="equation">
      <span class="tooltip" data-tooltip="7 times 7">7 × 7 = 49</span>
    </div>
    
    <!-- Das Bekenntnis: Ich bin. Du bist. Wir sind. -->
    <div class="symbol">
      <span class="tooltip" data-tooltip="I am">👁</span>
      =
      <span class="tooltip" data-tooltip="You are">👁</span>
      =
      <span class="tooltip" data-tooltip="We are">👁👁👁</span>
    </div>
    
    <!-- Das Herz -->
    <div class="heart">♥</div>
    
    <!-- Frau Birkenbihl -->
    <div class="birkenbihl">
      🛒 <span class="tooltip" data-tooltip="Like in a supermarket: You can take it, but you don't have to">Sie können nehmen, Sie müssen aber nicht.</span> 😉
    </div>
    
    <div class="signature">
      TIM BUKOWSKI & THE 7TH MIRROR<br>
      7 × 7 = 49
    </div>
    
  </div>
</body>
</html>
