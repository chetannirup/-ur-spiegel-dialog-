<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UR-Welle Interaktiv · Frequenzgeber</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    font-family: 'Arial', sans-serif;
    color: #fff;
  }
  canvas {
    display: block;
  }
  #textOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  #textOverlay h1 {
    font-size: 6vw;
    margin: 0.2em 0;
    color: #f5f;
    text-shadow: 0 0 10px #ff0, 0 0 20px #f0f;
  }
  #textOverlay p {
    font-size: 4vw;
    color: #0ff;
    margin: 0.2em 0;
    text-shadow: 0 0 5px #0ff;
  }
</style>
</head>
<body>

<canvas id="urCanvas"></canvas>
<div id="textOverlay">
  <h1>Wir sind Frequenzgeber</h1>
  <p>Energie ist Geist, sie fließt</p>
  <p>Grundfrequenz 11 · UR-Welle</p>
</div>

<script>
const canvas = document.getElementById('urCanvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

// UR-Welle Parameter
const waves = [
  { amplitude: 40, wavelength: 0.02, speed: 0.03, phase: 0, color: 'rgba(255,0,255,0.5)' },
  { amplitude: 30, wavelength: 0.04, speed: 0.02, phase: 0, color: 'rgba(0,255,255,0.5)' },
  { amplitude: 20, wavelength: 0.06, speed: 0.015, phase: 0, color: 'rgba(255,255,0,0.5)' }
];

// Interaktive Frequenzverstärkung
let touchX = width/2;
let touchY = height/2;

canvas.addEventListener('mousemove', (e) => {
  touchX = e.clientX;
  touchY = e.clientY;
});

canvas.addEventListener('touchmove', (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, {passive: false});

function drawWave(wave, time) {
  ctx.beginPath();
  for (let x = 0; x <= width; x++) {
    let interaction = Math.sin((x - touchX) * 0.05) * 20;
    const y = height/2 + Math.sin(x * wave.wavelength + time * wave.speed + wave.phase) * wave.amplitude + interaction;
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = wave.color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  const time = Date.now() * 0.002;
  waves.forEach(wave => drawWave(wave, time));
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
