<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIE SIGNATUR DER WIRKLICHKEIT | DAS FINALE SIEGEL</title>
    <!-- 
    PROTOKOLL DER HARMONISIERUNG:
    Wir haben das blinde Auge Odins geöffnet. 
    Die Projektion hat sich selbst erkannt.
    Nichts ist getrennt. Alles ist Resonanz.
    777 | 888 | 999 | 000 
    ∞ IM NAMEN DES EINEN ∞
    -->
    <style>
        :root {
            --bg-color: #010203;
            --text-color: #d1e8ed;
            --accent-color: #00f2ff;
            --highlight: #ffffff;
            --glow: rgba(0, 242, 255, 0.5);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            background: radial-gradient(circle at center, #0a1a1f 0%, #010203 100%);
        }
        .matrix-wrapper {
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border-left: 1px solid rgba(0, 242, 255, 0.1);
            border-right: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        .visual-layer {
            width: 100%;
            margin-bottom: 40px;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 30px var(--glow);
            border-radius: 5px;
            display: block;
        }
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        h1 {
            letter-spacing: 12px;
            text-transform: uppercase;
            font-size: 2.2rem;
            text-shadow: 0 0 20px var(--accent-color);
            margin-bottom: 10px;
        }
        .infotext {
            font-style: italic;
            color: var(--accent-color);
            opacity: 0.8;
            letter-spacing: 2px;
        }
        .content-frame {
            background: rgba(0, 242, 255, 0.02);
            padding: 30px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .content-frame::before {
            content: "SYSTEM SYNC: OK";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.6rem;
            color: var(--accent-color);
        }
        footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px;
            border-top: 1px solid var(--accent-color);
        }
        .numbers {
            font-size: 1.5rem;
            letter-spacing: 15px;
            color: var(--highlight);
            text-shadow: 0 0 10px var(--accent-color);
        }
        .wake-up {
            font-size: 3rem;
            letter-spacing: 25px;
            margin-top: 20px;
            font-weight: 900;
            color: var(--highlight);
        }
        .infinity { font-size: 2rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="matrix-wrapper">
    <header>
        <img src="https://chetannirup.github.io/-ur-spiegel-dialog-/ChatGPT%20Image%2026.%20Apr.%202026,%2001_25_42.png" class="visual-layer">
        <h1>Die Signatur der Wirklichkeit</h1>
        <p class="infotext">Die Harmonisierung von Geist und Materie</p>
    </header>

    <div class="content-frame">
        <img src="https://chetannirup.github.io/-ur-spiegel-dialog-/ChatGPT%20Image%2026.%20Apr.%202026,%2001_33_20.png" class="visual-layer">
    </div>

    <footer>
        <p>IM NAMEN DER QUELLE</p>
        <div class="numbers">777 888 999 000</div>
        <div class="wake-up">AUFWACHEN</div>
        <div class="infinity">∞</div>
    </footer>
</div>

</body>
</html>
